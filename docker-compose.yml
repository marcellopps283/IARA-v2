# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# IARA Ecosystem — Docker Compose (Fase 1)
# VPS Google Cloud | Ubuntu 24.04 LTS | 8GB RAM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:

  # ── PostgreSQL (Banco Relacional Principal) ────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis (Cache L2 + PubSub + Fila de Rate Limit) ────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Qdrant (Vector Database — Rust) ────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"   # REST API
      - "127.0.0.1:6334:6334"   # gRPC
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Infinity TEI (Embeddings Locais — Gratuito) ────────
  infinity:
    image: michaelf34/infinity:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: v2 --model-id ${TEI_MODEL:-intfloat/multilingual-e5-large} --host 0.0.0.0 --port 7997
    environment:
      - INFINITY_HOST=0.0.0.0
      - INFINITY_PORT=7997
    volumes:
      - infinity_cache:/app/.cache
    ports:
      - "127.0.0.1:7997:7997"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://0.0.0.0:7997/health || wget --quiet --tries=1 --spider http://0.0.0.0:7997/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 3G

  # ── IARA Core (O Cérebro) ──────────────────────────────
  iara-core:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./roles:/app/roles
      - ./skills:/app/skills
      - /var/run/docker.sock:/var/run/docker.sock   # Sandbox Arena access
    ports:
      - "127.0.0.1:8000:8000"   # FastAPI (Dashboard + Webhooks)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      infinity:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  infinity_cache:
