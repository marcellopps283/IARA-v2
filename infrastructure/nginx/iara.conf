# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Nginx Reverse Proxy — IARA Dashboard + Webhooks
# Localização sugerida: dentro do Nginx Proxy Manager ou
# em /etc/nginx/sites-available/iara.conf
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

upstream iara_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name iara.seudominio.me;

    # Redireciona HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name iara.seudominio.me;

    # ── Certificados Let's Encrypt (gerenciados pelo Nginx Proxy Manager) ──
    # Se estiver usando NPM, essas linhas são preenchidas automaticamente.
    # Se estiver fazendo manual:
    # ssl_certificate     /etc/letsencrypt/live/iara.seudominio.me/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/iara.seudominio.me/privkey.pem;

    # ── Rotas de Webhook do Telegram (SEM Auth — Telegram precisa acessar) ──
    location /webhook/ {
        proxy_pass http://iara_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Dashboard e API (COM Basic Auth) ──
    location / {
        auth_basic "IARA Control Room";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://iara_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (para streaming futuro)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
